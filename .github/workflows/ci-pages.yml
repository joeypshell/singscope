name: CI, Safari, and Pages

on:
  push:
    branches: [main, 'codex/**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: singscope-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 11.7.0

jobs:
  quality:
    name: quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit:prod
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm build:pages
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: quality-debug
          path: |
            coverage
            dist
          if-no-files-found: ignore

  e2e-mobile-webkit:
    name: e2e-mobile-webkit
    needs: quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps webkit
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: mobile-webkit-results
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  e2e-ios-simulator-safari:
    name: e2e-ios-simulator-safari
    needs: quality
    runs-on: macos-26
    timeout-minutes: 35
    concurrency:
      group: singscope-ios-simulator-safari
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:pages
      - name: Select and boot iPhone 17 / iOS 26.4
        run: |
          DEVICE_UDID=$(xcrun simctl list devices available --json | jq -r '.devices | to_entries[] | select(.key | endswith("iOS-26-4")) | .value[] | select(.name == "iPhone 17") | .udid' | head -1)
          test -n "$DEVICE_UDID"
          echo "IOS_DEVICE_UDID=$DEVICE_UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE_UDID" || true
          xcrun simctl bootstatus "$DEVICE_UDID" -b
      - name: Run SafariDriver production smoke
        env:
          SINGSCOPE_TEST_URL: http://127.0.0.1:4173/singscope/
          IOS_PLATFORM_VERSION: '26.4'
        run: |
          pnpm preview:pages --host 127.0.0.1 > /tmp/singscope-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID || true; cat /tmp/singscope-preview.log' EXIT
          for attempt in {1..30}; do curl -fsS "$SINGSCOPE_TEST_URL" >/dev/null && break; sleep 1; done
          sudo safaridriver --enable
          pnpm test:safari

  deploy-pages:
    name: deploy-pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality, e2e-mobile-webkit, e2e-ios-simulator-safari]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - run: pnpm build:pages
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  live-mobile-webkit-smoke:
    name: live-mobile-webkit-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy-pages
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps webkit
      - name: Smoke deployed Pages build
        env:
          PLAYWRIGHT_BASE_URL: https://joeypshell.github.io/singscope/
        run: pnpm exec playwright test tests/e2e/live-smoke.spec.ts --project=mobile-webkit

  live-ios-simulator-safari-smoke:
    name: live-ios-simulator-safari-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy-pages
    runs-on: macos-26
    timeout-minutes: 25
    concurrency:
      group: singscope-ios-simulator-safari
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Select and boot iPhone 17 / iOS 26.4
        run: |
          DEVICE_UDID=$(xcrun simctl list devices available --json | jq -r '.devices | to_entries[] | select(.key | endswith("iOS-26-4")) | .value[] | select(.name == "iPhone 17") | .udid' | head -1)
          test -n "$DEVICE_UDID"
          echo "IOS_DEVICE_UDID=$DEVICE_UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE_UDID" || true
          xcrun simctl bootstatus "$DEVICE_UDID" -b
      - name: Smoke deployed Pages build in Simulator Safari
        env:
          SINGSCOPE_TEST_URL: https://joeypshell.github.io/singscope/
          IOS_PLATFORM_VERSION: '26.4'
        run: |
          for attempt in {1..30}; do curl -fsS "$SINGSCOPE_TEST_URL" >/dev/null && break; sleep 2; done
          sudo safaridriver --enable
          pnpm test:safari
