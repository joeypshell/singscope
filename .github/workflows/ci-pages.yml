name: CI, Safari, and Pages

on:
  push:
    branches: [main, 'codex/**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: singscope-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 11.7.0

jobs:
  quality:
    name: quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit:prod
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm typecheck:supabase
      - run: pnpm test:coverage
      - run: pnpm test:supabase
      - run: pnpm build:pages
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: quality-debug
          path: |
            coverage
            dist
          if-no-files-found: ignore

  e2e-mobile-webkit:
    name: e2e-mobile-webkit
    needs: quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps webkit
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: mobile-webkit-results
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  e2e-ios-simulator-safari:
    name: e2e-ios-simulator-safari
    needs: quality
    runs-on: macos-26
    timeout-minutes: 35
    concurrency:
      group: singscope-ios-simulator-safari
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:pages
      - name: Select and boot iPhone 17 / iOS 26.4
        run: |
          DEVICE_UDID=$(xcrun simctl list devices available --json | jq -r '.devices | to_entries[] | select(.key | endswith("iOS-26-4")) | .value[] | select(.name == "iPhone 17") | .udid' | head -1)
          test -n "$DEVICE_UDID"
          echo "IOS_DEVICE_UDID=$DEVICE_UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE_UDID" || true
          xcrun simctl bootstatus "$DEVICE_UDID" -b
          open -a Simulator --args -CurrentDeviceUDID "$DEVICE_UDID"
          xcrun simctl launch "$DEVICE_UDID" com.apple.mobilesafari || true
          sleep 5
      - name: Run SafariDriver production smoke
        env:
          SINGSCOPE_TEST_URL: http://127.0.0.1:4173/singscope/
        run: |
          pnpm preview:pages --host 127.0.0.1 > /tmp/singscope-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID || true; cat /tmp/singscope-preview.log' EXIT
          PREVIEW_READY=false
          for attempt in {1..60}; do
            if curl -fsS "$SINGSCOPE_TEST_URL" >/dev/null; then PREVIEW_READY=true; break; fi
            sleep 1
          done
          test "$PREVIEW_READY" = true
          sudo safaridriver --enable
          SAFARI_SMOKE_PASSED=false
          for attempt in {1..5}; do
            echo "SafariDriver smoke attempt $attempt of 5"
            xcrun simctl terminate "$IOS_DEVICE_UDID" com.apple.mobilesafari || true
            if pnpm test:safari; then SAFARI_SMOKE_PASSED=true; break; fi
            sleep 5
          done
          test "$SAFARI_SMOKE_PASSED" = true

  deploy-pages:
    name: deploy-pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality, e2e-mobile-webkit, e2e-ios-simulator-safari]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Require the verified production report backend
        env:
          VITE_SINGSCOPE_REPORT_ENDPOINT: ${{ vars.SINGSCOPE_REPORT_ENDPOINT }}
          REPORT_ABUSE_GATE_VERIFIED: ${{ vars.SINGSCOPE_REPORT_ABUSE_GATE_VERIFIED }}
          REPORT_PRIVATE_ACCESS_VERIFIED: ${{ vars.SINGSCOPE_REPORT_PRIVATE_ACCESS_VERIFIED }}
          REPORT_RETENTION_VERIFIED: ${{ vars.SINGSCOPE_REPORT_RETENTION_VERIFIED }}
        run: |
          test -n "$VITE_SINGSCOPE_REPORT_ENDPOINT"
          test "$REPORT_ABUSE_GATE_VERIFIED" = 'true'
          test "$REPORT_PRIVATE_ACCESS_VERIFIED" = 'true'
          test "$REPORT_RETENTION_VERIFIED" = 'true'
      - name: Verify report endpoint and browser preflight
        env:
          REPORT_ENDPOINT: ${{ vars.SINGSCOPE_REPORT_ENDPOINT }}
        run: |
          PREFLIGHT_STATUS=$(curl --silent --show-error --output /tmp/report-preflight-body --dump-header /tmp/report-preflight-headers --write-out '%{http_code}' --request OPTIONS "$REPORT_ENDPOINT" \
            --header 'Origin: https://joeypshell.github.io' \
            --header 'Access-Control-Request-Method: POST' \
            --header 'Access-Control-Request-Headers: content-type,x-singscope-package-bytes,x-singscope-package-id,x-singscope-package-sha256,x-singscope-report-proof,x-singscope-report-ticket,x-singscope-schema-version')
          test "$PREFLIGHT_STATUS" = '204'
          tr -d '\r' < /tmp/report-preflight-headers | grep --ignore-case --fixed-strings 'access-control-allow-origin: https://joeypshell.github.io'

          printf 'not-a-zip' > /tmp/invalid-singscope-report
          INVALID_HASH=$(sha256sum /tmp/invalid-singscope-report | cut -d ' ' -f 1)
          printf '{"format":"singscope-analysis-report-ticket-request","schemaVersion":1}' > /tmp/singscope-ticket-request
          TICKET_STATUS=$(curl --silent --show-error --output /tmp/report-ticket-body --write-out '%{http_code}' --request POST "$REPORT_ENDPOINT" \
            --header 'Origin: https://joeypshell.github.io' \
            --header 'Content-Type: application/json' \
            --header 'X-SingScope-Package-Bytes: 9' \
            --header 'X-SingScope-Package-Id: 00000000-0000-4000-8000-000000000001' \
            --header "X-SingScope-Package-Sha256: $INVALID_HASH" \
            --header 'X-SingScope-Schema-Version: 1' \
            --data-binary @/tmp/singscope-ticket-request)
          test "$TICKET_STATUS" = '201'
          jq -e '.format == "singscope-analysis-report-ticket" and .schemaVersion == 1 and (.ticket | type == "string") and (.difficulty | type == "number")' /tmp/report-ticket-body >/dev/null

          # A forged upload without the signed ticket/proof must be rejected
          # before the function reads or validates the ZIP bytes.
          INVALID_STATUS=$(curl --silent --show-error --output /tmp/report-invalid-body --write-out '%{http_code}' --request POST "$REPORT_ENDPOINT" \
            --header 'Origin: https://joeypshell.github.io' \
            --header 'Content-Type: application/zip' \
            --header 'X-SingScope-Package-Bytes: 9' \
            --header 'X-SingScope-Package-Id: 00000000-0000-4000-8000-000000000001' \
            --header "X-SingScope-Package-Sha256: $INVALID_HASH" \
            --header 'X-SingScope-Schema-Version: 1' \
            --data-binary @/tmp/invalid-singscope-report)
          test "$INVALID_STATUS" = '403'
          jq -e '.error.code == "REPORT_TICKET_INVALID"' /tmp/report-invalid-body >/dev/null
      - run: pnpm build:pages
        env:
          VITE_SINGSCOPE_REPORT_ENDPOINT: ${{ vars.SINGSCOPE_REPORT_ENDPOINT }}
          VITE_SINGSCOPE_REPORT_PUBLISHABLE_KEY: ${{ vars.SINGSCOPE_REPORT_PUBLISHABLE_KEY }}
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  live-mobile-webkit-smoke:
    name: live-mobile-webkit-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy-pages
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps webkit
      - name: Smoke deployed Pages build
        env:
          PLAYWRIGHT_BASE_URL: https://joeypshell.github.io/singscope/
        run: pnpm exec playwright test tests/e2e/live-smoke.spec.ts --project=mobile-webkit

  live-ios-simulator-safari-smoke:
    name: live-ios-simulator-safari-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy-pages
    runs-on: macos-26
    timeout-minutes: 25
    concurrency:
      group: singscope-ios-simulator-safari
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Select and boot iPhone 17 / iOS 26.4
        run: |
          DEVICE_UDID=$(xcrun simctl list devices available --json | jq -r '.devices | to_entries[] | select(.key | endswith("iOS-26-4")) | .value[] | select(.name == "iPhone 17") | .udid' | head -1)
          test -n "$DEVICE_UDID"
          echo "IOS_DEVICE_UDID=$DEVICE_UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE_UDID" || true
          xcrun simctl bootstatus "$DEVICE_UDID" -b
          open -a Simulator --args -CurrentDeviceUDID "$DEVICE_UDID"
          xcrun simctl launch "$DEVICE_UDID" com.apple.mobilesafari || true
          sleep 5
      - name: Smoke deployed Pages build in Simulator Safari
        env:
          SINGSCOPE_TEST_URL: https://joeypshell.github.io/singscope/
        run: |
          PAGES_READY=false
          for attempt in {1..30}; do
            if curl -fsS "$SINGSCOPE_TEST_URL" >/dev/null; then PAGES_READY=true; break; fi
            sleep 2
          done
          test "$PAGES_READY" = true
          sudo safaridriver --enable
          SAFARI_SMOKE_PASSED=false
          for attempt in {1..5}; do
            echo "SafariDriver live smoke attempt $attempt of 5"
            xcrun simctl terminate "$IOS_DEVICE_UDID" com.apple.mobilesafari || true
            if pnpm test:safari; then SAFARI_SMOKE_PASSED=true; break; fi
            sleep 5
          done
          test "$SAFARI_SMOKE_PASSED" = true
